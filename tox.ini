[tox]
requires =
    tox-uv
env_list =
    py39
    py310
    py311
    py312
    py313
    ruff
    mypy

[testenv]
runner = uv-venv-lock-runner
dependency_groups =
    dev
set_env =
    USE_COVERAGE = false
commands =
    uv run behave {posargs}

[testenv:ruff]
commands =
    uv run ruff check .

[testenv:mypy]
commands =
    uv run mypy .
