stages:
  - test
  - build
  - publish

variables:
  PYTHON_VERSION: "3.13"
  # 指向 Runner 掛載的 WSL 快取目錄
  UV_CACHE_DIR: "/cache/uv"

default:
  image:
    name: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-trixie-slim
    entrypoint: [""]

lint:
  stage: test
  script:
    - uv sync --frozen --cache-dir $UV_CACHE_DIR
    - uv run ruff check .

test:
  stage: test
  before_script:
    - apt-get update && apt-get install -y ffmpeg
  script:
    - uv sync --frozen --cache-dir $UV_CACHE_DIR
    - uv run behave

.docker_job:
  # 使用包含 git 的 docker 映像檔，或在 before_script 安裝
  image: docker:24.0.5
  only:
    - tags
  before_script:
    # 確保環境中有 git 以便取得版本號
    - apk add --no-cache git
    - export FQIN=$FQIP:$(git describe --always --tags)

build:
  extends: .docker_job
  stage: build
  environment: production
  script:
    - docker build --target publish -t $FQIN .

publish:
  extends: .docker_job
  stage: publish
  environment: production
  script:
    - docker run -e UV_PUBLISH_TOKEN "$FQIN"
