stages:
  - test
  - build
  - publish

variables:
  PYTHON_VERSION: "3.13"
  # 指向 Runner 掛載的 WSL 快取目錄
  UV_CACHE_DIR: "/cache/uv"
  DOCKER_BUILDKIT: "1"

default:
  image:
    name: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-trixie-slim
    entrypoint: [""]

# TBD Flow 規則定義
.rules-mr-and-trunk:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.rules-trunk-only:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true

.rules-release:
  rules:
    - if: $CI_COMMIT_TAG

lint:
  extends: .rules-mr-and-trunk
  stage: test
  script:
    - uv sync --frozen --cache-dir $UV_CACHE_DIR
    - uv run ruff check .

test-multi-version:
  extends: 
    - .docker_job
    - .rules-mr-and-trunk
  stage: test
  parallel:
    matrix:
      - PY_VER: ["3.9", "3.10", "3.11", "3.12", "3.13"]
  script:
    # 使用 docker build 跑測試，將版本號傳入 Dockerfile
    # 這樣測試環境內就會有 Dockerfile 定義好的 ffmpeg
    - docker build --target test --build-arg PYTHON_VERSION=$PY_VER -t ffxpy-test-$PY_VER .
    - docker run --rm -e USE_COVERAGE=false ffxpy-test-$PY_VER
  after_script:
    - export FQIN=${CI_PROJECT_PATH_SLUG}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    - docker rmi ffxpy-test-$PY_VER || true

build:
  extends:
    - .docker_job
    - .rules-mr-and-trunk
  rules:
    - !reference [.rules-mr-and-trunk, rules]
    - !reference [.rules-release, rules]
  stage: build
  script:
    - docker build --target publish -t $FQIN .
  after_script:
    - export FQIN=${CI_PROJECT_PATH_SLUG}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    # 如果不是 main 分支也不是 Tag (單純的 Feature Branch MR)，建構完就刪除以節省空間
    - |
      if [ "$CI_COMMIT_BRANCH" != "$CI_DEFAULT_BRANCH" ] && [ -z "$CI_COMMIT_TAG" ]; then
        docker rmi $FQIN || true
      fi

# 發佈到 TestPyPI (僅限 main 分支)
publish-test:
  extends:
    - .docker_job
    - .rules-trunk-only
  stage: publish
  environment: develop
  script:
    # 假設您的 Dockerfile 支援透過環境變數切換發佈目標
    # 或者您可以在這裡直接執行 uv publish --publish-url https://test.pypi.org/legacy/
    - docker run -e UV_PUBLISH_TOKEN="$UV_PUBLISH_TOKEN" -e UV_PUBLISH_URL="$UV_PUBLISH_URL" "$FQIN"
  after_script:
    - export FQIN=${CI_PROJECT_PATH_SLUG}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    - docker rmi $FQIN || true

# 發佈到正式 PyPI (僅限 Tags)
publish:
  extends:
    - .docker_job
    - .rules-release
  stage: publish
  environment: production
  script:
    - docker run -e UV_PUBLISH_TOKEN "$FQIN"
  after_script:
    - export FQIN=${CI_PROJECT_PATH_SLUG}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
    - docker rmi $FQIN || true

.docker_job:
  # 升級 Docker 版本以支援較新的 API (1.44+)
  image: docker:27.5
  variables:
    # 使用專案路徑 slug，保證在同一個 Runner 上唯一
    IMAGE_NAME: ${CI_PROJECT_PATH_SLUG}
  before_script:
    # 確保環境中有 git 以便取得版本號
    - apk add --no-cache git
    # 在每個 shell session 中都重新計算 FQIN 以確保可用性
    - export FQIN=${IMAGE_NAME}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
