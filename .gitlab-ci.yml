stages:
  - test
  - build
  - publish

variables:
  PYTHON_VERSION: "3.13"
  # 指向 Runner 掛載的 WSL 快取目錄
  UV_CACHE_DIR: "/cache/uv"

default:
  image:
    name: ghcr.io/astral-sh/uv:python${PYTHON_VERSION}-trixie-slim
    entrypoint: [""]

lint:
  stage: test
  script:
    - uv sync --frozen --cache-dir $UV_CACHE_DIR
    - uv run ruff check .

test:
  stage: test
  before_script:
    - apt-get update && apt-get install -y ffmpeg
  script:
    - uv sync --frozen --cache-dir $UV_CACHE_DIR
    - uv run behave

.docker_job:
  # 使用包含 git 的 docker 映像檔，或在 before_script 安裝
  image: docker:24.0.5
  variables:
    DOCKER_BUILDKIT: "0"
    # 使用專案路徑 slug，保證在同一個 Runner 上唯一且不依賴 Registry 服務
    IMAGE_NAME: ${CI_PROJECT_PATH_SLUG}
  before_script:
    # 確保環境中有 git 以便取得版本號
    - apk add --no-cache git
    # 優先使用 Tag，否則使用 commit SHA 作為映像檔標籤
    - export FQIN=${IMAGE_NAME}:${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}

build:
  extends: .docker_job
  stage: build
  environment: production
  script:
    - docker build --target publish -t $FQIN .

publish:
  extends: .docker_job
  stage: publish
  environment: production
  only:
    - tags
  script:
    - docker run -e UV_PUBLISH_TOKEN "$FQIN"
